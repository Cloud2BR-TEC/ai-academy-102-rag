site_name: "Building a Multi-Agent RAG Chatbot"
site_description: "Two implementation options for Multi-Agent RAG with architecture, setup, and deployment guidance."
site_url: https://cloud2br-tec.github.io/ai-academy-102-rag/
docs_dir: docs

copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Fundamentals:
    - What Is Multi-Agent RAG?: 0_What_is_MultiAgent_RAG.md
    - Build Approaches: 3_Build_Approaches.md
  - 02. Implementation Options:
    - Option A - Agentic DevOps AI Shopping: 1_Agentic_Shopping_Overview.md
    - Option B - Agentic AI Media Assistant: 2_Agentic_Media_Assistant_Overview.md
  - 03. Shared Delivery:
    - From Shared Repo To Pages: 4_Repo_Setup_and_Shared_Content.md
    - Deployment and Publish: 5_Deployment_and_Publish.md
    - Troubleshooting: troubleshooting.md
